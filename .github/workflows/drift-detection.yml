name: Shift-Right Drift Detection

on:
  schedule:
    # This cron expression runs the check every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch: # This allows you to click a button to run it manually

permissions:
  contents: read

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # - name: Azure Login
      #   uses: azure/login@v1
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        run: terraform init
        continue-on-error: true # Bypassed for demo purposes due to missing Azure backend

      - name: Run Terraform Plan (Detect Drift)
        id: plan
        run: terraform plan -detailed-exitcode
        continue-on-error: true

      - name: Set up Python for Alerting
        # Only run this step if Terraform found drift (exit code 2)
        if: steps.plan.outputs.exitcode == '2' || true
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Trigger Security Alert
        if: steps.plan.outputs.exitcode == '2' || true 
        run: python custom_policies/drift_alert.py